  <defs>
    <filter id="shadow-play" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#829ab1" flood-opacity="0.3" />
    </filter>
    <filter id="glow-play" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bg-play" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f4f8" />
    </radialGradient>
    <linearGradient id="arch-blue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="arch-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbd38d" />
      <stop offset="100%" stop-color="#ed8936" />
    </linearGradient>
    <linearGradient id="arch-pink" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f687b3" />
      <stop offset="100%" stop-color="#d53f8c" />
    </linearGradient>
  </defs>

